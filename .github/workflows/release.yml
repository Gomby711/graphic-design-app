name: Build and Release Desktop Apps

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        run: echo "version=1.0.$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pywebview pyinstaller

      - name: Set version
        shell: pwsh
        run: Set-Content -Path app/version.py -Value "APP_VERSION = `"${{ needs.version.outputs.version }}`""

      - name: Build Windows app
        shell: pwsh
        run: >
          python -m PyInstaller --noconfirm --windowed --name GraphicDesignTips
          --icon app/icon.ico
          --add-data "app/static;static"
          --add-data "app/lessons.json;."
          --add-data "app/gif_manifest.json;."
          --add-data "app/icon.ico;."
          --add-data "CHANGELOG.md;."
          app/server.py

      - name: Zip build
        shell: pwsh
        run: Compress-Archive -Path dist/GraphicDesignTips/* -DestinationPath GraphicDesignTips-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: GraphicDesignTips-Windows.zip

  build-macos:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pywebview pyinstaller

      - name: Set version
        run: echo "APP_VERSION = \"${{ needs.version.outputs.version }}\"" > app/version.py

      - name: Build macOS app
        run: >
          python -m PyInstaller --noconfirm --windowed --name GraphicDesignTips
          --add-data "app/static:static"
          --add-data "app/lessons.json:."
          --add-data "app/gif_manifest.json:."
          --add-data "CHANGELOG.md:."
          app/server.py

      - name: Zip build
        run: ditto -c -k --sequesterRsrc --keepParent dist/GraphicDesignTips.app GraphicDesignTips-macOS.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: GraphicDesignTips-macOS.zip

  release:
    needs: [version, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-build"
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: |
            GraphicDesignTips-Windows.zip
            GraphicDesignTips-macOS.zip
